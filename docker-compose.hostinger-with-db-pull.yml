# Our API image: we build it in GitHub Actions; Hostinger only pulls and runs it.
# API + Postgres on same VPS; no build on Hostinger.
#
# 1. Replace REPO_OWNER below with your GitHub username (or org) in lowercase – GHCR requires lowercase.
# 2. Run workflow "Build and push API image" to build and publish our image to GHCR.
# 3. Use this file's raw URL in Hostinger "Compose from URL".

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gepanda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gepanda
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: gepanda
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gepanda"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # Use your GitHub username/org in lowercase (e.g. devhypertech, mycompany)
    image: ghcr.io/devhypertech/gepanda-api:latest
    container_name: gepanda-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://gepanda:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/gepanda?schema=public
      # Set in Hostinger UI: STREAM_API_KEY, STREAM_API_SECRET, JWT_SECRET, WEB_APP_URL

volumes:
  postgres_data:
