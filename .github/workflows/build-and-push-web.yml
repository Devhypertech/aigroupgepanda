# Web (Next.js) image: build here and push to GHCR. Hostinger pulls and runs it.
#
# Flow: GitHub Actions builds Dockerfile.web → pushes to ghcr.io/OWNER/gepanda-web:latest
#       Hostinger uses docker-compose (with web service) → pulls image, no build on VPS.
#
# Setup:
# 1. Repo Settings → Actions → General: "Read and write permissions" for workflows.
# 2. Repo Settings → Secrets and variables → Actions: add variable NEXT_PUBLIC_API_URL
#    (e.g. https://api.yourdomain.com or http://YOUR_VPS_IP:3002).
# 3. Run this workflow (or trigger on push to staging) to build and publish the web image.
# 4. In Hostinger use the full compose file that includes the web service.

name: Build and push Web image

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repo owner for GHCR
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build args (NEXT_PUBLIC_* baked into client)
        id: build_args
        run: |
          if [ -n "${{ vars.NEXT_PUBLIC_API_URL }}" ]; then
            echo "api_url=${{ vars.NEXT_PUBLIC_API_URL }}" >> $GITHUB_OUTPUT
          else
            echo "api_url=http://api:3001" >> $GITHUB_OUTPUT
          fi
          echo "stream_key=${{ vars.NEXT_PUBLIC_STREAM_API_KEY }}" >> $GITHUB_OUTPUT

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.build_args.outputs.api_url }}
            NEXT_PUBLIC_STREAM_API_KEY=${{ steps.build_args.outputs.stream_key }}
          tags: |
            ghcr.io/${{ env.REPO_OWNER_LC }}/gepanda-web:latest
            ghcr.io/${{ env.REPO_OWNER_LC }}/gepanda-web:${{ github.sha }}
