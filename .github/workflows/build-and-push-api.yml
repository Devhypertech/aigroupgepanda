# Our API image: we build it here and push to GHCR. Hostinger only pulls and runs it.
#
# Flow: GitHub Actions builds our Dockerfile → pushes to ghcr.io/OWNER/gepanda-api:latest
#       Hostinger uses docker-compose.hostinger-with-db-pull.yml → pulls our image, no build on VPS.
#
# Setup:
# 1. Repo Settings → Actions → General: "Read and write permissions" for workflows.
# 2. Run this workflow once (or on every push to staging/main) to build and publish our image.
# 3. In docker-compose.hostinger-with-db-pull.yml set image to ghcr.io/YOUR_GITHUB_USER/gepanda-api:latest.
# 4. In Hostinger "Compose from URL" use the pull compose file; Hostinger will use our image.

name: Build and push API image

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repo owner for GHCR
        run: echo "REPO_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER_LC }}/gepanda-api:latest
            ghcr.io/${{ env.REPO_OWNER_LC }}/gepanda-api:${{ github.sha }}
